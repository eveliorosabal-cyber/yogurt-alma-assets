<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yogurt Alma | Artesanal desde el Corazón</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Ajustes para videos en slider */
        .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(44,24,16,0.3), rgba(44,24,16,0.7));
            z-index: 1;
        }
        .slide.active video {
            display: block;
        }
        .slide video + .hero-content {
            z-index: 2;
        }
    </style>
</head>
<body data-theme="default">
    <!-- Theme Switcher -->

        <button class="theme-btn" data-theme="default" title="Tema Claro">🌞</button>
        <button class="theme-btn" data-theme="dark" title="Tema Oscuro">🌙</button>
        <button class="theme-btn" data-theme="soft" title="Tema Suave">🌸</button>

    <!-- HERO (estructura vacía, se llenará con JSON) -->

    <!-- Contenedor dinámico para categorías -->

    <!-- CARRITO -->

    <!-- MODAL CHECKOUT -->

    <!-- PANTALLAS ESTADO -->

        <a href="#" class="whatsapp-btn" id="whatsapp-btn" target="_blank">Enviar pedido por WhatsApp</a>

    <script>
        // ==========================================
        // CONFIGURACIÓN GITHUB
        // ==========================================
        const CONFIG_GITHUB = {
            USER: 'eveliorosabal-cyber',
            REPO: 'yogurt-alma-assets',
            BRANCH: 'main',
            PATHS: {
                slider: 'images/slider'
            }
        };

        // ==========================================
        // DATOS GLOBALES
        // ==========================================
        let CONFIG = {};      // se llena desde config.json
        let CATALOG = {};     // productos agrupados por categoría
        let cart = {};
        let deliveryCost = 0;
        let currentPayment = 'cash';
        let currentLocationTab = 'gps';
        let userLocation = null;

        // Elementos dinámicos
        const categoriesContainer = document.getElementById('categories-container');
        const heroContent = document.getElementById('hero-content');
        const modalBody = document.getElementById('modal-body');

        // ==========================================
        // FUNCIONES DE CARGA DE DATOS
        // ==========================================
        async function loadConfig() {
            const base = `https://raw.githubusercontent.com/${CONFIG_GITHUB.USER}/${CONFIG_GITHUB.REPO}/${CONFIG_GITHUB.BRANCH}/`;
            const url = base + 'config.json?t=' + Date.now();
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                CONFIG = await resp.json();
                console.log('Config cargada:', CONFIG);
            } catch (e) {
                console.error('Error cargando config.json:', e);
                alert('No se pudo cargar la configuración. Revisa tu conexión.');
                throw e;
            }
        }

           if (productosValidos.length === 0) {
            console.warn('No se encontró ningún producto con imagen válida');
            categoriesContainer.innerHTML = '<div class="error-message">⚠️ No hay productos disponibles hoy. Por favor, revisa más tarde.</div>';
        }
        
    } catch (e) {
        console.error('Error cargando productos.json:', e);
        alert('No se pudo cargar la lista de productos.');
        throw e;

}

// ==========================================
// RENDERIZADO DE CATEGORÍAS (solo con productos válidos)
// ==========================================
function renderCategories() {
    if (!CATALOG) return;
    const categoriesOrder = CONFIG.categories.order;
    categoriesContainer.innerHTML = '';
    for (const catKey of categoriesOrder) {
        const products = CATALOG[catKey];
        if (!products || products.length === 0) continue; // No mostrar categorías vacías
        
        const title = CONFIG.categories.names[catKey] || catKey;
        const description = CONFIG.categories.descriptions[catKey] || '';
        const logoFile = CONFIG.categories.logos[catKey];
        let logoHtml = '';
        if (logoFile) {
            const base = `https://raw.githubusercontent.com/${CONFIG_GITHUB.USER}/${CONFIG_GITHUB.REPO}/${CONFIG_GITHUB.BRANCH}/`;
            const logoUrl = base + `images/logos/${encodeURIComponent(logoFile)}`;
            logoHtml = `<img src="${logoUrl}" alt="${title}" class="section-logo" onerror="this.style.display='none'">`;
        }
        const section = document.createElement('section');
        section.className = 'section';
        section.id = `cat-${catKey}`;
        section.innerHTML = `
            <div class="section-header fade-up">
                ${logoHtml}
                <h2 class="section-title">${title}</h2>
                <p class="section-subtitle">${description}</p>
            </div>
            <div class="loading-grid" id="loading-${catKey}">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
            <div class="products-grid hidden" id="grid-${catKey}"></div>
        `;
        categoriesContainer.appendChild(section);
        
        const grid = document.getElementById(`grid-${catKey}`);
        const loadingDiv = document.getElementById(`loading-${catKey}`);
        if (grid && loadingDiv) {
            products.forEach(prod => grid.appendChild(createProductCard(prod)));
            loadingDiv.style.display = 'none';
            grid.classList.remove('hidden');
        }
    }
}
        
        // ==========================================
        // SLIDER CON IMÁGENES Y VIDEOS
        // ==========================================
        let sliderInterval;
        let currentSlide = 0;
        let sliderItems = [];

        async function initSlider() {
            const container = document.getElementById('hero-slider');
            const loading = document.getElementById('slider-loading');
            const dotsContainer = document.getElementById('slider-dots');
            if (!container || !loading || !dotsContainer) return;

            const base = `https://raw.githubusercontent.com/${CONFIG_GITHUB.USER}/${CONFIG_GITHUB.REPO}/${CONFIG_GITHUB.BRANCH}/`;
            const folderPath = CONFIG_GITHUB.PATHS.slider;
            const encodedPath = encodeURIComponent(folderPath);
            const url = `https://api.github.com/repos/${CONFIG_GITHUB.USER}/${CONFIG_GITHUB.REPO}/contents/${encodedPath}?ref=${CONFIG_GITHUB.BRANCH}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const files = await response.json();
                const mediaFiles = files.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return ['jpg', 'jpeg', 'png', 'gif', 'mp4', 'webm', 'mov'].includes(ext);
                });
                if (mediaFiles.length === 0) throw new Error('No media files');

                sliderItems = mediaFiles.map(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const isVideo = ['mp4', 'webm', 'mov'].includes(ext);
                    return {
                        type: isVideo ? 'video' : 'image',
                        url: file.download_url
                    };
                });

                // Limpiar container
                while (container.firstChild) container.removeChild(container.firstChild);

                sliderItems.forEach((item, idx) => {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = `slide ${idx === 0 ? 'active' : ''}`;
                    if (item.type === 'image') {
                        slideDiv.style.backgroundImage = `url('${item.url}')`;
                        slideDiv.style.backgroundSize = 'cover';
                        slideDiv.style.backgroundPosition = 'center';
                    } else {
                        const video = document.createElement('video');
                        video.src = item.url;
                        video.autoplay = true;
                        video.muted = true;
                        video.loop = true;
                        video.playsInline = true;
                        video.style.width = '100%';
                        video.style.height = '100%';
                        video.style.objectFit = 'cover';
                        slideDiv.appendChild(video);
                    }
                    container.appendChild(slideDiv);
                });

                // Dots
                dotsContainer.innerHTML = '';
                sliderItems.forEach((_, i) => {
                    const dot = document.createElement('span');
                    dot.className = `dot ${i === 0 ? 'active' : ''}`;
                    dot.onclick = () => goToSlide(i);
                    dotsContainer.appendChild(dot);
                });

                loading.style.display = 'none';
                startSliderAuto();
            } catch (e) {
                console.warn('Error cargando slider, usando imagen por defecto');
                container.innerHTML = `<div class="slide active" style="background-image: url('https://via.placeholder.com/1920x1080/2C1810/FAF7F2?text=Yogurt+Alma');"></div>`;
                loading.style.display = 'none';
            }
        }

        function startSliderAuto() {
            if (sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                const dots = document.querySelectorAll('.dot');
                if (slides.length === 0) return;
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
            }, 5000);
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.dot');
            if (slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            clearInterval(sliderInterval);
            startSliderAuto();
        }

        // ==========================================
        // RENDERIZADO DE PÁGINA (hero + categorías)
        // ==========================================
        function renderHero() {
            if (!CONFIG.hero) return;
            heroContent.innerHTML = `
                <div class="hero-badge">${CONFIG.hero.badge}</div>
                <h1 class="hero-title">${CONFIG.hero.title}</h1>
                <p class="hero-subtitle">${CONFIG.hero.subtitle}</p>
                <button class="btn-primary" onclick="scrollToProducts()">${CONFIG.hero.button}</button>
            `;
        }

        function renderCategories() {
            if (!CATALOG) return;
            const categoriesOrder = CONFIG.categories.order;
            categoriesContainer.innerHTML = '';
            for (const catKey of categoriesOrder) {
                const products = CATALOG[catKey];
                if (!products || products.length === 0) continue;
                const title = CONFIG.categories.names[catKey] || catKey;
                const description = CONFIG.categories.descriptions[catKey] || '';
                const logoFile = CONFIG.categories.logos[catKey];
                let logoHtml = '';
                if (logoFile) {
                    const base = `https://raw.githubusercontent.com/${CONFIG_GITHUB.USER}/${CONFIG_GITHUB.REPO}/${CONFIG_GITHUB.BRANCH}/`;
                    const logoUrl = base + `images/logos/${encodeURIComponent(logoFile)}`;
                    logoHtml = `<img src="${logoUrl}" alt="${title}" class="section-logo" onerror="this.style.display='none'">`;
                }
                const section = document.createElement('section');
                section.className = 'section';
                section.id = `cat-${catKey}`;
                section.innerHTML = `
                    <div class="section-header fade-up">
                        ${logoHtml}
                        <h2 class="section-title">${title}</h2>
                        <p class="section-subtitle">${description}</p>
                    </div>
                    <div class="loading-grid" id="loading-${catKey}">
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                    </div>
                    <div class="products-grid hidden" id="grid-${catKey}"></div>
                `;
                categoriesContainer.appendChild(section);
                // Llenar productos
                const grid = document.getElementById(`grid-${catKey}`);
                const loadingDiv = document.getElementById(`loading-${catKey}`);
                if (grid && loadingDiv) {
                    products.forEach(prod => grid.appendChild(createProductCard(prod)));
                    loadingDiv.style.display = 'none';
                    grid.classList.remove('hidden');
                }
            }
        }

        // Versión corregida de createProductCard (sin error de sintaxis)
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card fade-up';

            const img = document.createElement('img');
            img.className = 'product-image';
            img.alt = product.name;
            img.src = product.image;
            img.onerror = function() {
                this.onerror = null;
                const svg = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'%3E%3Crect width='400' height='300' fill='%23F5F0E8'/%3E%3Ctext x='50%25' y='50%25' font-size='16' text-anchor='middle' dy='.3em' fill='%238B6F47'%3E${encodeURIComponent(product.name)}%3C/text%3E%3C/svg%3E`;
                this.src = svg;
            };

            const imageWrapper = document.createElement('div');
            imageWrapper.className = 'product-image-wrapper';
            imageWrapper.appendChild(img);
            if (product.badge) {
                const badge = document.createElement('span');
                badge.className = 'product-badge';
                badge.textContent = product.badge;
                imageWrapper.appendChild(badge);
            }

            const productInfo = document.createElement('div');
            productInfo.className = 'product-info';
            productInfo.innerHTML = `
                <div class="product-meta">
                    <span class="product-weight">${product.weight}</span>
                    <span class="product-stock">Disponible hoy</span>
                </div>
                <h3 class="product-name">${product.name}</h3>
                <p class="product-description">${product.desc}</p>
                <div class="product-footer">
                    <span class="product-price">Gs. ${product.price.toLocaleString('es-PY')}</span>
                    <div class="quantity-selector">
                        <button class="qty-btn" onclick="updateQuantity('${product.id}', -1)">−</button>
                        <span class="qty-value" id="qty-${product.id}">0</span>
                        <button class="qty-btn" onclick="updateQuantity('${product.id}', 1)">+</button>
                    </div>
                </div>
            `;

            card.appendChild(imageWrapper);
            card.appendChild(productInfo);
            return card;
        }

        // ==========================================
        // CARRITO Y CHECKOUT
        // ==========================================
        function updateQuantity(productId, delta) {
            const newQty = cart[productId] + delta;
            if (newQty >= 0) {
                cart[productId] = newQty;
                const el = document.getElementById(`qty-${productId}`);
                if (el) el.textContent = newQty;
                updateCart();
            }
        }

        function updateCart() {
            const allProducts = Object.values(CATALOG).flat();
            const items = allProducts.filter(p => cart[p.id] > 0);
            const subtotal = items.reduce((sum, p) => sum + (cart[p.id] * p.price), 0);
            const total = subtotal + deliveryCost;

            document.getElementById('cart-total').textContent = total.toLocaleString('es-PY');
            document.getElementById('cart-float').classList.toggle('active', items.length > 0);
            if (modalBody && modalBody.children.length) updateCheckoutSummary(subtotal, total);
        }

        function updateCheckoutSummary(subtotal, total) {
            const summarySubtotal = document.getElementById('summary-subtotal');
            if (summarySubtotal) summarySubtotal.textContent = subtotal.toLocaleString('es-PY');
            const summaryTotal = document.getElementById('summary-total');
            if (summaryTotal) summaryTotal.textContent = total.toLocaleString('es-PY');
            const transferAmount = document.getElementById('transfer-amount');
            if (transferAmount) transferAmount.textContent = 'Gs. ' + total.toLocaleString('es-PY');
            const container = document.getElementById('summary-items');
            if (container) {
                const allProducts = Object.values(CATALOG).flat();
                const items = allProducts.filter(p => cart[p.id] > 0);
                if (items.length === 0) {
                    container.innerHTML = '<p style="color: #999; font-size: 0.9rem;">No hay productos seleccionados</p>';
                } else {
                    container.innerHTML = items.map(p => `
                        <div class="summary-item">
                            <span>${p.name} × ${cart[p.id]}</span>
                            <span>Gs. ${(cart[p.id] * p.price).toLocaleString('es-PY')}</span>
                        </div>
                    `).join('');
                }
            }
        }

        function openCheckout() {
            const allProducts = Object.values(CATALOG).flat();
            const items = allProducts.filter(p => cart[p.id] > 0);
            if (items.length === 0) {
                alert('Agregá productos a tu pedido');
                return;
            }
            updateCart();
            const modal = document.getElementById('modal-checkout');
            if (modal) modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            if (modalBody.children.length === 0) {
                renderCheckoutModal();
            } else {
                const subtotal = items.reduce((sum, p) => sum + (cart[p.id] * p.price), 0);
                const total = subtotal + deliveryCost;
                updateCheckoutSummary(subtotal, total);
            }
        }

        function renderCheckoutModal() {
            const deliveryZonesHtml = CONFIG.delivery_zones.map(z => `<option value="${z.maxKm}">${z.label} (hasta ${z.maxKm}km) - Gs. ${z.price.toLocaleString('es-PY')}</option>`).join('');
            modalBody.innerHTML = `
                <div class="order-summary">
                    <h3 class="summary-title">Resumen de tu orden</h3>
                    <div id="summary-items"></div>
                    <div class="summary-item" style="margin-top: 0.5rem;">
                        <span>Subtotal</span>
                        <span>Gs. <span id="summary-subtotal">0</span></span>
                    </div>
                    <div class="summary-item">
                        <span>Delivery</span>
                        <span id="summary-delivery">Gs. 0</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span>Gs. <span id="summary-total">0</span></span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Nombre completo *</label>
                    <input type="text" class="form-input" id="client-name" placeholder="Ej: María Fernández">
                </div>
                <div class="form-group">
                    <label class="form-label">WhatsApp *</label>
                    <input type="tel" class="form-input" id="client-phone" placeholder="Ej: 0981 123 456">
                </div>
                <div class="form-group">
                    <label class="form-label">Tipo de entrega</label>
                    <select class="form-select" id="delivery-type" onchange="handleDeliveryChange()">
                        <option value="pickup">Retiro en local (Gratis)</option>
                        <option value="delivery">Delivery a domicilio</option>
                    </select>
                </div>
                <div id="location-section" class="conditional-section">
                    <div class="form-group">
                        <label class="form-label">Indicar ubicación para delivery *</label>
                        <div class="location-tabs">
                            <button class="location-tab active" onclick="switchTab('gps', this)">Buscar dirección (GPS)</button>
                            <button class="location-tab" onclick="switchTab('maps', this)">Google Maps</button>
                        </div>
                        <div id="panel-gps" class="location-panel active">
                            <button class="btn-gps" onclick="getGPSLocation()">📍 Obtener mi ubicación actual</button>
                            <div class="gps-info" id="gps-info">
                                <strong>Dirección aproximada:</strong>
                                <p id="gps-address"></p>
                                <p id="gps-coords" style="font-size:0.85rem; color:#666;"></p>
                                <button class="copy-location-btn" onclick="copyGPSLocation()">Copiar dirección</button>
                            </div>
                        </div>

                                    <li>Tocá el botón de abajo para abrir Google Maps</li>

                        </div>

                </div>
                <div id="transfer-section" class="conditional-section">
                    <div class="transfer-info">
                        <p style="margin-bottom: 0.5rem; font-weight: 600;">Realizá la transferencia al siguiente alias:</p>

                        <p style="font-size: 0.875rem; color: #666; margin-bottom: 1rem;">Tocá el alias para copiarlo</p>

                            <strong>Banco:</strong> Tigo Money / Bancard<br>
                            <strong>Titular:</strong> ${CONFIG.store.name}<br>
                            <strong>Monto:</strong> <span id="transfer-amount">Gs. 0</span>
                        </div>
                    </div>
                </div>

                    </div>
                </div>
                <button class="btn-confirm" id="btn-confirm" onclick="confirmOrder()">Confirmar Pedido</button>
            `;
        }

        function closeCheckout(e) {
            if (!e || e.target.id === 'modal-checkout') {
                const modal = document.getElementById('modal-checkout');
                if (modal) modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function handleDeliveryChange() {
            const type = document.getElementById('delivery-type').value;
            const locationSection = document.getElementById('location-section');
            if (type === 'delivery') {
                locationSection.classList.add('active');
                if (userLocation && userLocation.lat) {
                    calculateDeliveryCost(userLocation.lat, userLocation.lng);
                } else if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => calculateDeliveryCost(pos.coords.latitude, pos.coords.longitude),
                        () => { deliveryCost = CONFIG.delivery_zones[1]?.price || 8000; updateDeliveryDisplay(); }
                    );
                }
            } else {
                locationSection.classList.remove('active');
                deliveryCost = 0;
                updateDeliveryDisplay();
            }
        }

        function calculateDeliveryCost(lat, lng) {
            const dist = calculateDistance(CONFIG.store.location.lat, CONFIG.store.location.lng, lat, lng);
            let rate = CONFIG.delivery_zones[CONFIG.delivery_zones.length-1];
            for (const zone of CONFIG.delivery_zones) {
                if (dist <= zone.maxKm) {
                    rate = zone;
                    break;
                }
            }
            deliveryCost = rate.price;
            userLocation = { ...userLocation, lat, lng, distance: dist };
            updateDeliveryDisplay();
            const summaryDelivery = document.getElementById('summary-delivery');
            if (summaryDelivery) {
                summaryDelivery.innerHTML = `Gs. ${deliveryCost.toLocaleString('es-PY')} <small style="color: #666">(${rate.label}, ${dist.toFixed(1)}km)</small>`;
            }
        }

        function updateDeliveryDisplay() {
            const summaryDelivery = document.getElementById('summary-delivery');
            if (summaryDelivery) {
                summaryDelivery.textContent = deliveryCost === 0 ? 'Gratis' : `Gs. ${deliveryCost.toLocaleString('es-PY')}`;
            }
            updateCart();
        }

        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function switchTab(tab, el) {
            currentLocationTab = tab;
            document.querySelectorAll('.location-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.location-panel').forEach(p => p.classList.remove('active'));
            const panel = document.getElementById(`panel-${tab}`);
            if (panel) panel.classList.add('active');
        }

        function getGPSLocation() {
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización');
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                userLocation = { lat, lng, address: `${lat}, ${lng}` };
                const gpsAddress = document.getElementById('gps-address');
                if (gpsAddress) gpsAddress.textContent = `Coordenadas: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                const gpsCoords = document.getElementById('gps-coords');
                if (gpsCoords) gpsCoords.textContent = `Coordenadas: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                const gpsInfo = document.getElementById('gps-info');
                if (gpsInfo) gpsInfo.classList.add('active');
                calculateDeliveryCost(lat, lng);
            }, () => {
                alert('No se pudo obtener la ubicación');
            });
        }

        function copyGPSLocation() {
            if (!userLocation) return;
            const text = `${userLocation.address}\nCoordenadas: ${userLocation.lat.toFixed(6)}, ${userLocation.lng.toFixed(6)}`;
            navigator.clipboard.writeText(text).then(() => alert('Dirección copiada'));
        }

        function selectPayment(method) {
            currentPayment = method;
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById(`pay-${method}`).classList.add('selected');
            document.getElementById('transfer-section').classList.toggle('active', method === 'transfer');
            document.getElementById('cash-section').classList.toggle('active', method === 'cash');
        }

        function calculateChange() {
            const amount = parseInt(document.getElementById('cash-amount').value) || 0;
            const allProducts = Object.values(CATALOG).flat();
            const total = allProducts.reduce((sum, p) => sum + (cart[p.id] * p.price), 0) + deliveryCost;
            const change = amount - total;
            const display = document.getElementById('change-display');
            if (!display) return;
            if (amount === 0) {
                display.style.display = 'none';
                return;
            }
            display.style.display = 'block';
            if (change < 0) {
                display.className = 'vuelto-box error';
                display.textContent = `Faltan Gs. ${Math.abs(change).toLocaleString('es-PY')}`;
            } else {
                display.className = 'vuelto-box ok';
                display.textContent = `Vuelto: Gs. ${change.toLocaleString('es-PY')}`;
            }
        }

        function copyAlias() {
            navigator.clipboard.writeText(CONFIG.store.alias).then(() => {
                const box = document.querySelector('.alias-box');
                if (box) {
                    const original = box.textContent;
                    box.textContent = '¡COPIADO!';
                    setTimeout(() => box.textContent = original, 1500);
                }
            });
        }

        async function confirmOrder() {
            const name = document.getElementById('client-name').value.trim();
            const phone = document.getElementById('client-phone').value.trim();
            const deliveryType = document.getElementById('delivery-type').value;
            if (!name) { alert('Ingresá tu nombre'); return; }
            if (!phone) { alert('Ingresá tu WhatsApp'); return; }
            let address = '';
            if (deliveryType === 'delivery') {
                if (currentLocationTab === 'gps') {
                    if (!userLocation || !userLocation.address) {
                        alert('Primero obtené tu ubicación con GPS');
                        return;
                    }
                    address = userLocation.address;
                } else if (currentLocationTab === 'maps') {
                    address = document.getElementById('maps-link').value.trim();
                    if (!address) { alert('Pegá el enlace de Google Maps o la dirección'); return; }
                }
            } else {
                address = 'Retiro en local - ' + CONFIG.store.name;
            }
            if (currentPayment === 'cash') {
                const amount = parseInt(document.getElementById('cash-amount').value) || 0;
                const allProducts = Object.values(CATALOG).flat();
                const total = allProducts.reduce((sum, p) => sum + (cart[p.id] * p.price), 0) + deliveryCost;
                if (amount < total) { alert('El monto es insuficiente'); return; }
            }
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.classList.add('active');
            const allProducts = Object.values(CATALOG).flat();
            const items = allProducts.filter(p => cart[p.id] > 0);
            const order = {
                id: 'YA-' + Date.now().toString().slice(-6),
                timestamp: new Date().toISOString(),
                customer: { name, phone },
                items: items.map(p => ({ name: p.name, qty: cart[p.id], price: p.price })),
                totals: {
                    subtotal: items.reduce((sum, p) => sum + (cart[p.id] * p.price), 0),
                    delivery: deliveryCost,
                    total: items.reduce((sum, p) => sum + (cart[p.id] * p.price), 0) + deliveryCost
                },
                delivery: {
                    type: deliveryType,
                    address: address,
                    coords: userLocation ? `${userLocation.lat},${userLocation.lng}` : ''
                },
                payment: { method: currentPayment, alias: currentPayment === 'transfer' ? CONFIG.store.alias : null }
            };
            const message = generateSecureMessage(order);
            const whatsappUrl = `https://wa.me/${CONFIG.store.whatsapp}?text=${encodeURIComponent(message)}`;
            try {
                await fetch(CONFIG.store.google_sheets_url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                });
            } catch (e) {}
            setTimeout(() => {
                loadingScreen.classList.remove('active');
                const successScreen = document.getElementById('success-screen');
                successScreen.classList.add('active');
                document.getElementById('whatsapp-btn').href = whatsappUrl;
                document.getElementById('success-message').textContent = currentPayment === 'transfer' 
                    ? `Tu pedido está pendiente de pago.\n\nAlias: ${CONFIG.store.alias}\nMonto: Gs. ${order.totals.total.toLocaleString('es-PY')}\n\nUna vez realizada la transferencia, envianos el comprobante por WhatsApp.`
                    : 'Tu pedido está confirmado. Te contactaremos cuando esté listo.';
            }, 1500);
        }

        function generateSecureMessage(order) {
            const lines = [
                '🥛 *YOGURT ALMA - PEDIDO OFICIAL*',
                '',
                `*N° Pedido:* ${order.id}`,
                `*Fecha:* ${new Date().toLocaleString('es-PY')}`,
                '',
                '*CLIENTE:*',
                `Nombre: ${order.customer.name}`,
                `Tel: ${order.customer.phone}`,
                '',
                '*PRODUCTOS:*'
            ];
            order.items.forEach(item => {
                lines.push(`• ${item.qty}x ${item.name}`);
                lines.push(`  Gs. ${(item.qty * item.price).toLocaleString('es-PY')}`);
            });
            lines.push('');
            lines.push('*TOTALES:*');
            lines.push(`Subtotal: Gs. ${order.totals.subtotal.toLocaleString('es-PY')}`);
            if (order.totals.delivery > 0) lines.push(`Delivery: Gs. ${order.totals.delivery.toLocaleString('es-PY')}`);
            lines.push(`*TOTAL A PAGAR: Gs. ${order.totals.total.toLocaleString('es-PY')}*`);
            lines.push('');
            lines.push('*ENTREGA:*');
            lines.push(`Tipo: ${order.delivery.type === 'pickup' ? 'Retiro en local' : 'Delivery'}`);
            lines.push(`Dirección: ${order.delivery.address}`);
            if (order.delivery.coords) lines.push(`Maps: https://maps.google.com/?q=${order.delivery.coords}`);
            lines.push('');
            lines.push('*PAGO:*');
            if (order.payment.method === 'transfer') {
                lines.push(`Método: Transferencia`);
                lines.push(`Alias: ${order.payment.alias}`);
                lines.push(`Estado: PENDIENTE (esperando comprobante)`);
            } else {
                lines.push(`Método: Efectivo`);
                const amount = document.getElementById('cash-amount').value;
                const change = parseInt(amount) - order.totals.total;
                lines.push(`Paga con: Gs. ${parseInt(amount).toLocaleString('es-PY')}`);
                lines.push(`Vuelto: Gs. ${change.toLocaleString('es-PY')}`);
            }
            lines.push('');
            lines.push('✅ Pedido generado automáticamente');
            lines.push('📍 Por favor no modifiques este mensaje');
            return lines.join('\n');
        }

        function resetOrder() {
            location.reload();
        }

        function scrollToProducts() {
            const firstSection = categoriesContainer.querySelector('.section');
            if (firstSection) firstSection.scrollIntoView({ behavior: 'smooth' });
        }

        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        }

        function setupAdminAccess() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                    document.getElementById('admin-panel').classList.toggle('visible');
                }
            });
        }

        function downloadJSONTemplate() {
            const allProducts = Object.values(CATALOG).flat();
            const template = allProducts.map(p => ({
                id: p.id,
                name: p.name,
                desc: p.desc,
                weight: p.weight,
                price: p.price,
                category: p.category,
                badge: p.badge || null,
                imageFile: p.imageFile
            }));
            const blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'productos.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function initThemeSwitcher() {
            const btns = document.querySelectorAll('.theme-btn');
            const saved = localStorage.getItem('yogurt-theme') || 'default';
            document.body.setAttribute('data-theme', saved);
            btns.forEach(btn => btn.addEventListener('click', () => {
                const theme = btn.getAttribute('data-theme');
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('yogurt-theme', theme);
            }));
        }

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadConfig();
                await loadProductsFromJSON();
                renderHero();
                renderCategories();
                await initSlider();
                initThemeSwitcher();
                initScrollAnimations();
                setupAdminAccess();
            } catch (err) {
                console.error('Error fatal:', err);
                alert('Error al cargar la página. Revisa tu conexión e intenta de nuevo.');
            }
        });
    </script>
